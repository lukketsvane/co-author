name: "FORML\xC6RE: MATHEMATICA"
slug: formlaere-mathematica
description: >
  Den formelle matematiske søsterteksten til Tractatus Formae.
  Inneheld alle definisjonar, postulat og teorem med komplette bevis
  som er refererte via [M: ...] i traktaten. 10 kapittel som dekkjer
  morforom, seleksjonstrykk, tilpassingslandskap, dynamikk, empiri,
  navigatorar, substrat-uavhengigheit, emergens, variasjonsprinsipp
  og konsekvensar.

goals:
  - Komplett deduktiv struktur: 5 postulat -> alle teorem
  - Kvart teorem har eit gyldig, komplett bevis
  - Alle 34 oppføringar i TF-appendikset "Formell korrespondanse" er dekte
  - Notasjon er konsistent og veldefindert
  - Falsifiseringsvilkår er presise og testbare
  - Typografi i EB Garamond som samsvarar med Tractatus Formae

staff:
  - wittgenstein
  - mathematikar
  - michael_levin
  - design_og_print

config:
  default_model: claude-opus-4-6
  web_search: false
  language: english

author: Iver Raknes Finne
institution: Institutt for design, AHO
sister_text: forsteutgave.pdf

created: 2026-03-29T00:00:00
